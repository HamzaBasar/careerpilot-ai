<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerPilot AI — M. Hamza Basar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060811;
  --surface: #0b0f1e;
  --card: #0f1628;
  --card2: #141c30;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --purple: #7c3aed;
  --violet: #8b5cf6;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --pink: #ec4899;
  --text: #e2e8f0;
  --muted: #64748b;
  --soft: #94a3b8;
  --nav-w: 72px;
  --sidebar-w: 240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  display:flex;flex-direction:column;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);
  background-size:52px 52px;
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:orbF ease-in-out infinite;}
.o1{width:500px;height:500px;top:-150px;left:-100px;background:rgba(59,130,246,0.07);animation-duration:22s;}
.o2{width:400px;height:400px;bottom:-100px;right:-50px;background:rgba(124,58,237,0.06);animation-duration:28s;animation-delay:-10s;}
.o3{width:300px;height:300px;top:40%;left:40%;background:rgba(6,182,212,0.04);animation-duration:18s;animation-delay:-5s;}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}

/* TOP BAR */
.topbar{
  position:relative;z-index:100;
  height:52px;min-height:52px;
  background:rgba(6,8,17,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
.topbar-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-left:calc(var(--nav-w));}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-text{background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-badge{margin-left:4px;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;text-transform:uppercase;}
.topbar-spacer{flex:1;}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--soft);}
.topbar-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--yellow),var(--pink));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:white;}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* NAV RAIL */
.nav-rail{
  width:var(--nav-w);min-width:var(--nav-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:4px;z-index:50;
}
.nav-btn{width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;transition:all 0.2s;position:relative;color:var(--muted);}
.nav-btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.nav-btn.active{background:rgba(59,130,246,0.15);color:var(--blue);}
.nav-btn .nb-icon{font-size:18px;line-height:1;}
.nav-btn .nb-label{font-size:9px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:0 3px 3px 0;background:var(--blue);}
.nav-sep{width:32px;height:1px;background:var(--border);margin:8px 0;}
.nav-rail-bottom{margin-top:auto;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent;z-index:40;}
.sidebar-section{padding:16px 12px 8px;}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 8px 8px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--muted);transition:all 0.2s;border:1px solid transparent;}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.sidebar-item.active{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.2);color:var(--blue);}
.sidebar-item .si-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-item .si-label{font-weight:500;flex:1;}
.sidebar-item .si-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:rgba(59,130,246,0.2);color:var(--blue);}
.sidebar-item .si-badge.green{background:rgba(16,185,129,0.2);color:#6ee7b7;}
.sidebar-item .si-badge.yellow{background:rgba(245,158,11,0.2);color:#fbbf24;}

/* MAIN PANEL */
.main-panel{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.tab-page{display:none;animation:fadeIn 0.3s ease;}
.tab-page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SHARED COMPONENTS */
.page-header{padding:32px 36px 24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(59,130,246,0.04),transparent);}
.page-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:white;margin-bottom:4px;letter-spacing:-0.5px;}
.page-sub{font-size:13px;color:var(--muted);line-height:1.6;}
.page-body{padding:28px 36px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;transition:border-color 0.3s;}
.card:hover{border-color:rgba(59,130,246,0.2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.3),transparent);opacity:0;transition:opacity 0.3s;}
.card:hover::before{opacity:1;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:white;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center;transition:all 0.3s;cursor:default;}
.stat-card:hover{border-color:rgba(59,130,246,0.3);transform:translateY(-2px);}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.3px;}

/* FORM */
.field{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:600;color:var(--soft);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:7px;}
input[type=text],input[type=email],input[type=url],select,textarea{
  width:100%;background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13.5px;padding:11px 14px;
  transition:all 0.25s;outline:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.04);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select{cursor:pointer;}
select option{background:#1e293b;}
textarea{resize:vertical;line-height:1.7;}

/* BUTTON */
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:all 0.25s;}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:white;box-shadow:0 4px 20px rgba(59,130,246,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,0.45);}
.btn-primary:disabled{opacity:0.5;transform:none;cursor:not-allowed;}
.btn-secondary{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{background:rgba(255,255,255,0.1);}
.btn-success{background:linear-gradient(135deg,var(--green),#059669);color:white;}
.btn-danger{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.btn-danger:hover{background:rgba(239,68,68,0.25);}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:12px;width:100%;justify-content:center;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-blue{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);color:#93c5fd;}
.badge-green{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7;}
.badge-yellow{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#fbbf24;}
.badge-red{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.badge-purple{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);color:#c4b5fd;}

/* ALERT */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;line-height:1.6;}
.alert-info{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-left:3px solid var(--blue);}
.alert-success{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-left:3px solid var(--green);}
.alert-warning{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-left:3px solid var(--yellow);}
.alert-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-left:3px solid var(--red);}

/* TAGS */
.tags-row{display:flex;gap:8px;flex-wrap:wrap;}
.tag{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:12.5px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--muted);background:transparent;user-select:none;}
.tag:hover{border-color:rgba(59,130,246,0.4);color:var(--soft);}
.tag.on{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.4);color:#93c5fd;}

/* OUTPUT GRID */
.out-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.out-item{background:rgba(255,255,255,0.02);border:1.5px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;}
.out-item:hover{border-color:rgba(59,130,246,0.3);}
.out-item.on{background:rgba(59,130,246,0.07);border-color:rgba(59,130,246,0.4);}
.out-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all 0.2s;color:transparent;}
.out-item.on .out-check{background:var(--blue);border-color:var(--blue);color:white;}

/* TRACKER TABLE */
.tracker-table{width:100%;border-collapse:collapse;font-size:13px;}
.tracker-table th{background:rgba(255,255,255,0.04);color:var(--muted);padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;border-bottom:1px solid var(--border);}
.tracker-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;color:var(--soft);}
.tracker-table tr:hover td{background:rgba(255,255,255,0.02);}
.tracker-table tr:last-child td{border-bottom:none;}
.company-cell{font-weight:600;color:var(--text);}
.status-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.s-applied{background:rgba(59,130,246,0.15);color:#93c5fd;}
.s-interview{background:rgba(245,158,11,0.15);color:#fbbf24;}
.s-offer{background:rgba(16,185,129,0.15);color:#6ee7b7;}
.s-rejected{background:rgba(239,68,68,0.15);color:#fca5a5;}
.s-followup{background:rgba(139,92,246,0.15);color:#c4b5fd;}

/* PROGRESS BAR */
.progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));}

/* SKILL TAGS */
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;}
.skill-tag{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid transparent;cursor:default;transition:all 0.2s;}
.skill-tag:hover{transform:translateY(-1px);}
.st-a{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:#93c5fd;}
.st-b{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.3);color:#67e8f9;}
.st-c{background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.3);color:#c4b5fd;}
.st-d{background:rgba(236,72,153,0.1);border-color:rgba(236,72,153,0.3);color:#f9a8d4;}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--blue),var(--purple),transparent);border-radius:1px;}
.tl-item{position:relative;margin-bottom:28px;}
.tl-dot{position:absolute;left:-24px;top:4px;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));border:2px solid var(--bg);box-shadow:0 0 10px rgba(59,130,246,0.5);}
.tl-period{font-size:11px;font-weight:600;color:var(--cyan);letter-spacing:0.5px;margin-bottom:4px;}
.tl-role{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:white;margin-bottom:2px;}
.tl-company{font-size:12px;color:var(--muted);margin-bottom:10px;}
.tl-bullets{list-style:none;}
.tl-bullets li{font-size:12.5px;color:var(--soft);line-height:1.65;padding-left:14px;position:relative;margin-bottom:5px;}
.tl-bullets li::before{content:'▸';position:absolute;left:0;color:var(--purple);font-size:10px;top:2px;}
.metric-pill{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:var(--cyan);padding:0 6px;border-radius:4px;font-weight:700;font-size:11px;}

/* PROMPT DISPLAY */
.prompt-box{background:#050810;border:1px solid rgba(59,130,246,0.2);border-radius:12px;padding:20px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.8;color:#a5f3fc;overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;}
.copy-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--soft);cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-top:10px;}
.copy-btn:hover{border-color:var(--blue);color:var(--blue);}
.copy-btn.copied{border-color:var(--green);color:var(--green);}

/* AI OUTPUT PANEL */
.ai-output-panel{display:none;margin-top:20px;}
.ai-output-panel.show{display:block;}
.output-tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
.output-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.output-tab:hover{color:var(--text);}
.output-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.output-content{display:none;}
.output-content.active{display:block;}
.output-text{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px;font-size:13.5px;line-height:1.8;color:var(--soft);white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;}
.output-text h1,.output-text h2,.output-text h3{color:white;font-family:'Syne',sans-serif;margin:16px 0 8px;}
.output-text strong{color:var(--text);}
.output-text ul,.output-text ol{padding-left:20px;margin:8px 0;}

/* LOADING OVERLAY */
.loading-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(6,8,17,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.loading-overlay.show{display:flex;}
.loading-spinner{width:50px;height:50px;border:3px solid rgba(59,130,246,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Syne',sans-serif;font-weight:700;color:white;font-size:1rem;}
.loading-sub{font-size:13px;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:1000;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,0.5);transform:translateY(80px);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{font-size:20px;flex-shrink:0;}
.toast-title{font-weight:600;color:white;margin-bottom:2px;}
.toast-msg{font-size:12px;color:var(--muted);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:28px;width:min(90vw,520px);position:relative;}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:white;margin-bottom:4px;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}

/* SETUP STEPS */
.setup-step{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.setup-step:last-child{border-bottom:none;}
.step-num-circle{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:white;}
.step-title{font-family:'Syne',sans-serif;font-weight:700;color:white;margin-bottom:4px;}
.step-desc{font-size:12.5px;color:var(--muted);line-height:1.7;}
.step-done{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:rgba(16,185,129,0.2);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;}

@media(max-width:900px){.sidebar{display:none;}.grid3,.grid4{grid-template-columns:1fr 1fr;}}
